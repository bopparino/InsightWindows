services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hvac
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:       postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/hvac
      SECRET_KEY:         ${SECRET_KEY}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD}
      STORAGE_PATH:       /app/data/quotes
      ESTIMATOR_NAME:     ${ESTIMATOR_NAME}
      ESTIMATOR_INITIALS: ${ESTIMATOR_INITIALS}
      COMPANY_LOGO_PATH:  ${COMPANY_LOGO_PATH:-}
      AZURE_CLIENT_ID:    ${AZURE_CLIENT_ID}
      AZURE_TENANT_ID:    ${AZURE_TENANT_ID}
      ALLOWED_ORIGINS:    ${ALLOWED_ORIGINS}
      SMTP_HOST:          ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_USER:          ${SMTP_USER:-}
      SMTP_PASSWORD:      ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME:     ${SMTP_FROM_NAME:-WHMetcalfe HVAC Estimating}
    volumes:
      - quote_data:/app/data/quotes

volumes:
  postgres_data:
  quote_data:
