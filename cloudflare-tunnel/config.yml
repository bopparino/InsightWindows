# Cloudflare Tunnel configuration
# Replace TUNNEL_ID below with the ID shown after running: cloudflared tunnel create hvac-bids
# The credentials file is auto-created by cloudflared in C:\Users\<YOU>\.cloudflared\

tunnel: TUNNEL_ID_GOES_HERE
credentials-file: C:\Users\YOUR_WINDOWS_USERNAME\.cloudflared\TUNNEL_ID_GOES_HERE.json

ingress:
  - hostname: bids.metcalfehvac.com
    service: http://localhost:8000
  - service: http_status:404
